services:
  postgres:
    image: postgres:16-alpine
    container_name: pokedle-postgres
    environment:
      POSTGRES_USER: pokedle
      POSTGRES_PASSWORD: pokedle
      POSTGRES_DB: pokedle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokedle"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
